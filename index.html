<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-site-verification" content="umgO6585SzaQnbPOUT_dHtdxe1QAa_gnzi6QMgI4KXo" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downey Collage Secondary School</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg: #08090a;
    --bg1: #0d0e10;
    --bg2: #111316;
    --bg3: #171a1e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6e0;
    --muted: #6b6966;
    --muted2: #9e9b97;
    --accent: #4f7cff;
    --accent2: #7aa2ff;
    --gold: #c9a84c;
    --gold2: #e8c97b;
    --green: #3ecf8e;
    --red: #e5534b;
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
  }

  /* ── LIGHT MODE ── */
  html.light {
    --bg: #f5f4f0;
    --bg1: #eeecea;
    --bg2: #e6e4e0;
    --bg3: #dddbd6;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1917;
    --muted: #8a8784;
    --muted2: #5c5a57;
    --accent: #2a5ce6;
    --accent2: #1e4cc9;
    --gold: #a07828;
    --gold2: #7a5a18;
    --green: #1e9e6a;
    --red: #c0392b;
  }

  /* Smooth theme transition — background, border, color only (not transform/opacity used by animations) */
  body, nav, section, div, span, p, h1, h2, h3, h4, a, button, input, textarea, select, footer, ul, li {
    transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
  }

  /* ── LIGHT MODE SPECIFIC OVERRIDES ── */
  html.light body::before { opacity: 0.15; }
  html.light .grid-lines {
    background-image:
      linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
  }
  html.light nav {
    background: rgba(245,244,240,0.88) !important;
    border-bottom-color: rgba(0,0,0,0.1);
  }
  html.light .hero-glow {
    background: radial-gradient(circle, rgba(42,92,230,0.1) 0%, transparent 70%);
  }
  html.light .hero-glow2 {
    background: radial-gradient(circle, rgba(160,120,40,0.08) 0%, transparent 70%);
  }
  html.light .cta-glow {
    background: radial-gradient(ellipse, rgba(42,92,230,0.08) 0%, transparent 70%);
  }
  html.light ::-webkit-scrollbar-track { background: var(--bg); }
  html.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); }
  html.light .btn-primary { background: var(--accent); }
  html.light .btn-primary:hover { background: #1e4cc9; box-shadow: 0 8px 24px rgba(42,92,230,0.25); }
  html.light .form-input, html.light .form-select { color: var(--text); }
  html.light .map-dot { background: var(--accent); box-shadow: 0 0 0 6px rgba(42,92,230,0.18), 0 0 0 12px rgba(42,92,230,0.08); }
  html.light .prog-fill { background: linear-gradient(90deg, var(--accent), var(--gold)); }
  html.light .announcement-bar { background: linear-gradient(90deg, rgba(42,92,230,0.1), rgba(160,120,40,0.07)); border-bottom-color: rgba(42,92,230,0.2); }

  /* ── THEME TOGGLE BUTTON ── */
  .theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    color: var(--muted2);
  }
  .theme-toggle:hover { border-color: var(--border2); background: var(--bg3); }
  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon {
    position: absolute;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    line-height: 1;
  }
  .theme-toggle .icon-sun  { transform: translateY(0) rotate(0deg); opacity: 1; }
  .theme-toggle .icon-moon { transform: translateY(24px) rotate(-90deg); opacity: 0; }
  html.light .theme-toggle .icon-sun  { transform: translateY(-24px) rotate(90deg); opacity: 0; }
  html.light .theme-toggle .icon-moon { transform: translateY(0) rotate(0deg); opacity: 1; }

  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius:99px; }

  /* ── NOISE OVERLAY ── */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:1000;
    opacity:0.4;
  }

  /* ── GRID LINES ── */
  .grid-lines {
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* ── NAV ── */
  nav {
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:900;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    height:60px;
    background: rgba(8,9,10,0.85);
    backdrop-filter: blur(20px) saturate(1.2);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }

  .nav-logo {
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
  }

  .logo-mark {
    width:30px;
    height:30px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-radius:7px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: var(--serif);
    font-size:16px;
    color:white;
    font-weight:400;
    flex-shrink:0;
  }

  .logo-text {
    font-size:13px;
    font-weight:500;
    color:var(--text);
    letter-spacing:0.02em;
    line-height:1.2;
  }
  .logo-text span { display:block; color:var(--muted2); font-weight:300; font-size:11px; }

  .nav-links {
    display:flex;
    align-items:center;
    gap:2px;
    list-style:none;
  }
  .nav-links a {
    display:block;
    padding:6px 12px;
    font-size:13px;
    color:var(--muted2);
    text-decoration:none;
    border-radius:6px;
    transition:color 0.2s, background 0.2s;
    letter-spacing:0.01em;
  }
  .nav-links a:hover { color:var(--text); background: rgba(255,255,255,0.05); }

  .nav-cta {
    display:flex;
    align-items:center;
    gap:10px;
  }
  .btn {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:7px 16px;
    border-radius:7px;
    font-size:13px;
    font-family:var(--sans);
    font-weight:500;
    cursor:pointer;
    text-decoration:none;
    transition:all 0.2s;
    letter-spacing:0.01em;
    border:none;
  }
  .btn-ghost {
    background:transparent;
    color:var(--muted2);
    border:1px solid var(--border2);
  }
  .btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,0.25); background:rgba(255,255,255,0.04); }
  .btn-primary {
    background: var(--accent);
    color:white;
  }
  .btn-primary:hover { background:#6088ff; transform:translateY(-1px); box-shadow:0 8px 24px rgba(79,124,255,0.3); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #a87c30);
    color:white;
  }
  .btn-gold:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(201,168,76,0.3); }

  /* ── SECTIONS ── */
  section { position:relative; }
  .container { max-width:1100px; margin:0 auto; padding:0 40px; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:120px 40px 80px;
    position:relative;
    overflow:hidden;
  }

  .hero-glow {
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(79,124,255,0.12) 0%, transparent 70%);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
    animation: pulse-glow 6s ease-in-out infinite;
  }
  .hero-glow2 {
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
    top:30%;
    right:15%;
    pointer-events:none;
    animation: pulse-glow 6s ease-in-out infinite;
  }
  </style>
</head>

</body>
</html>
